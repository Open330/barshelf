name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5

      # Pin to the Swift 6 toolchain used for release builds. The package still
      # has Swift 5.9 language compatibility, so strict checks are explicit.
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Toolchain
        run: swift --version && xcodebuild -version

      - name: Build
        run: swift build

      - name: Strict concurrency (core)
        run: swift build --target MenubucketCore -Xswiftc -strict-concurrency=complete -Xswiftc -warnings-as-errors

      - name: Test
        run: swift test

      - name: Validate JSON schemas
        run: |
          for f in schema/*.json registry/index.json; do
            python3 -c "import json,sys; json.load(open('$f')); print('ok', '$f')"
          done

      - name: Validate bundled widgets
        run: |
          swift build --product barshelf
          swift build --product bsf
          BARSHELF_CLI="$(swift build --product barshelf --show-bin-path)/barshelf"
          for w in widgets/*/; do
            [ -f "$w/widget.json" ] && "$BARSHELF_CLI" validate "$w"
          done
